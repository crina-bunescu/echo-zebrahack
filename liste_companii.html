<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <title>ZebraHack – Task 3</title>

    <!-- CSS -->
    <link rel="stylesheet" href="styles/style_map_lc.css" />
  </head>
  <body>
    <header>
      <h1>Lista companiilor din transportul de lemn</h1>
    </header>

    <!-- CONTROLS -->
    <section id="controls">
      <label>
        Tip companie:
        <select id="role">
          <option value="emitent">Emitent</option>
          <option value="destinatar">Destinatar</option>
        </select>
      </label>

      <label>
        Caută companie:
        <input id="search" type="text" placeholder="SC DEDEMAN SRL" />
      </label>
    </section>

    <!-- STATUS -->
    <section id="companies-status"></section>

    <!-- LIST -->
    <section id="companies-list"></section>

    <!-- JS (DOAR Task 3) -->
    <script src="scripts/lista_companii.js"></script>
  </body>
</html>
