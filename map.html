<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>Hartă – Rute transport lemn</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- CSS-ul tău -->
   <link rel="stylesheet" href="styles/style.css" />
  <link rel="stylesheet" href="styles/style_map_lc.css" />
</head>
<body>
<header class="nav-wrap">
  <div class="container">
    <nav class="nav">
      <a class="brand" href="index.html">
        <span class="brand-dot"></span>
        <span class="brand-text">Echo</span>
      </a>

      <ul class="nav-links">
        <li><a href="app.html">Home</a></li>
        <li><a href="map.html" class="active">Hartă</a></li>
        <li><a href="liste.html">Liste</a></li>
      </ul>

      <div class="nav-actions">
        <a class="btn" href="index.html">Ieși</a>
      </div>
    </nav>
  </div>
</header>

    <!-- LOADING OVERLAY (doar pentru rute) -->
    <div id="loading-overlay" class="hidden">
      <h2 id="loading-title">Se încarcă rutele</h2>
      <p id="loading-subtitle">Calculăm rutele pe hartă…</p>
    </div>


  <!-- SEARCH PANEL -->
    <div id="search-panel">
      <div class="search-controls">
        <select id="role-select">
          <option value="emitent">Emitent</option>
          <option value="destinatar">Destinatar</option>
        </select>

        <input id="search-input" type="text" placeholder="Caută companie…" />

        <button id="clear-search" title="Resetează">✕</button>
        <button
          id="toggle-radius"
          class="hidden-control"
          title="Arată/Ascunde raza"
        >
          Rază
        </button>
        <button
          id="open-details"
          class="hidden-control"
          title="Detalii companie"
        >
          Detalii
        </button>
      </div>

      <div id="search-results"></div>
    </div>

    <!-- DETAILS PANEL -->
    <div id="company-details" class="hidden">
      <div class="details-header">
        <h2 id="details-name"></h2>
        <button id="close-details" title="Închide">✕</button>
      </div>

      <div class="details-content">
        <p><strong>Rol:</strong> <span id="details-role"></span></p>
        <p>
          <strong>Rază de acțiune:</strong> <span id="details-radius"></span>
        </p>
        <p>
          <strong>Centru activitate:</strong><br />
          Lat: <span id="details-lat"></span><br />
          Lon: <span id="details-lon"></span>
        </p>
        <p>
          <strong>Ultima activitate:</strong><br />
          <span id="details-last"></span>
        </p>

        <hr />

        <button id="toggle-transports">Arată transporturile</button>

        <div id="transports-container" class="hidden">
          <table id="transports-table">
            <thead>
              <tr>
                <th>Aviz</th>
                <th>Volum</th>
                <th>Puncte GPS</th>
                <th>Actualizat</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
          <p class="hint">
            Tip: apasă pe un rând pentru a evidenția ruta pe hartă.
          </p>
        </div>
      </div>
    </div>

  <!-- HARTA FULL SCREEN -->
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- JS-ul tău -->
  <script src="scripts/map.js"></script>
</body>
</html>
